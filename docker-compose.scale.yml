version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mern-mongodb-prod
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - mern-network

  # Redis for session management & caching
  redis:
    image: redis:7-alpine
    container_name: mern-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Multiple backend instances (scale with: docker-compose up --scale backend=3)
  backend:
    build:
      context: ./backend
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/taskmanager?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL}
    depends_on:
      - mongodb
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mern-network

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend
    networks:
      - mern-network

  # Nginx as load balancer
  nginx:
    image: nginx:alpine
    container_name: mern-nginx-lb
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.lb.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mern-network

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: mern-prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mern-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: mern-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - mern-network

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  mern-network:
    driver: bridge
